          - AttributeName: projetoId
            KeyType: HASH
          - AttributeName: criadoEm
            KeyType: RANGE

    # ── S3 Bucket ──────────────────────────────────────────────────────

    DocumentsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: atlas-hub-documents-${self:provider.stage}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST]
              AllowedOrigins: ['*']
              MaxAge: 3000

  Outputs:
    UserPoolId:
      Value: !Ref CognitoUserPool
      Export:
        Name: atlas-hub-user-pool-id-${self:provider.stage}
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
      Export:
        Name: atlas-hub-user-pool-client-id-${self:provider.stage}
    ApiUrl:
      Value: !Sub 'https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}'
      Export:
        Name: atlas-hub-api-url-${self:provider.stage}
    DocumentsBucketName:
      Value: !Ref DocumentsBucket
      Export:
        Name: atlas-hub-documents-bucket-${self:provider.stage}
