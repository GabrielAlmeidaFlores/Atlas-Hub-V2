    # ── Cognito ────────────────────────────────────────────────────────

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: atlas-hub-users-${self:provider.stage}
        UsernameAttributes: [email]
        AutoVerifiedAttributes: [email]
        EmailVerificationMessage: "Seu código de verificação Atlas Hub: {####}"
        EmailVerificationSubject: "Confirme seu e-mail — Atlas Hub"
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: false
            RequireNumbers: true
            RequireSymbols: false
        LambdaConfig:
          PostConfirmation: !GetAtt OnIncorporadoraSignupLambdaFunction.Arn
        Schema:
          - Name: email
            Required: true
            Mutable: true

    CognitoLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt OnIncorporadoraSignupLambdaFunction.Arn
        Principal: cognito-idp.amazonaws.com
        SourceArn: !GetAtt CognitoUserPool.Arn

    CognitoIncorporadoraGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: INCORPORADORA
        UserPoolId: !Ref CognitoUserPool
        Description: "Incorporadoras that submit projects"

    CognitoAnalistaGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: ANALISTA
        UserPoolId: !Ref CognitoUserPool
        Description: "Atlas Hub internal analysts"

    CognitoAdminMasterGroup:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: ADMIN_MASTER
        UserPoolId: !Ref CognitoUserPool
        Description: "Atlas Hub admin master — can manage users"

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: atlas-hub-web-client
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        PreventUserExistenceErrors: ENABLED
        IdTokenValidity: 1
        AccessTokenValidity: 1
        RefreshTokenValidity: 30
        TokenValidityUnits:
          IdToken: hours
          AccessToken: hours
          RefreshToken: days

    ApiGatewayAuthorizer:
      Type: AWS::ApiGateway::Authorizer
      Properties:
        Name: AtlasHubCognitoAuthorizer
        Type: COGNITO_USER_POOLS
        IdentitySource: method.request.header.Authorization
        RestApiId: !Ref ApiGatewayRestApi
        ProviderARNs:
          - !GetAtt CognitoUserPool.Arn

    # ── DynamoDB Tables ────────────────────────────────────────────────

    AtlasIncorporadorasTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: AtlasIncorporadoras-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: cnpj
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: cnpj-index
            KeySchema:
              - AttributeName: cnpj
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    AtlasAdminsTable:
      Type: AWS::DynamoDB::Table
      Properties:
