          - AttributeName: status
            AttributeType: S
          - AttributeName: criadoEm
            AttributeType: S
          - AttributeName: analistaId
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: incorporadoraId-criadoEm-index
            KeySchema:
              - AttributeName: incorporadoraId
                KeyType: HASH
              - AttributeName: criadoEm
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: status-criadoEm-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: criadoEm
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: analistaId-status-index
