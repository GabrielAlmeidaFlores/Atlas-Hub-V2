name: Deploy — Prod

on:
  push:
    branches:
      - master

jobs:

  typecheck-backend:
    name: Typecheck backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps
      - name: TypeScript typecheck
        working-directory: backend
        run: npm run build

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: typecheck-backend
    outputs:
      api_url:      ${{ steps.cf.outputs.api_url }}
      user_pool_id: ${{ steps.cf.outputs.user_pool_id }}
      client_id:    ${{ steps.cf.outputs.client_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}
      - name: Install dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps
      - name: Deploy with Serverless Framework
        working-directory: backend
        run: npx serverless@3 deploy --stage prod
      - name: Read CloudFormation outputs
        id: cf
        run: |
          STACK="atlas-hub-backend-prod"
          REGION="${{ vars.AWS_REGION }}"
          get_output() {
            aws cloudformation describe-stacks \
              --stack-name "$STACK" \
              --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" \
              --output text --region "$REGION"
          }
          API_ID=$(aws cloudformation describe-stack-resource \
            --stack-name "$STACK" \
            --logical-resource-id ApiGatewayRestApi \
            --query 'StackResourceDetail.PhysicalResourceId' \
            --output text --region "$REGION")
          echo "api_url=https://${API_ID}.execute-api.${REGION}.amazonaws.com/prod" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(get_output UserPoolId)"                               >> $GITHUB_OUTPUT
          echo "client_id=$(get_output UserPoolClientId)"                            >> $GITHUB_OUTPUT

  health-check:
    name: Health check
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}
      - name: DynamoDB — check all tables
        run: |
          STAGE=prod
          REGION="${{ vars.AWS_REGION }}"
          FAIL=0
          for TABLE in AtlasIncorporadoras AtlasAdmins AtlasProjetos AtlasScorecard AtlasNotificacoes AtlasAuditoria AtlasNotas; do
            STATUS=$(aws dynamodb describe-table \
              --table-name "${TABLE}-${STAGE}" \
              --query 'Table.TableStatus' \
              --output text --region "$REGION" 2>&1)
            if [ "$STATUS" = "ACTIVE" ]; then echo "✓ ${TABLE}-${STAGE}: ACTIVE"
            else echo "✗ ${TABLE}-${STAGE}: $STATUS"; FAIL=1; fi
          done
          exit $FAIL
      - name: S3 — check documents bucket
        run: |
          aws s3api head-bucket --bucket "atlas-hub-documents-prod" --region "${{ vars.AWS_REGION }}" && \
            echo "✓ atlas-hub-documents-prod: exists" || { echo "✗ bucket not found"; exit 1; }
      - name: Cognito — check User Pool
        run: |
          POOL_ID="${{ needs.deploy-backend.outputs.user_pool_id }}"
          ID=$(aws cognito-idp describe-user-pool --user-pool-id "$POOL_ID" \
            --query 'UserPool.Id' --output text --region "${{ vars.AWS_REGION }}" 2>&1)
          [ "$ID" = "$POOL_ID" ] && echo "✓ User Pool: accessible" || { echo "✗ $ID"; exit 1; }
      - name: Lambda — check all functions
        run: |
          STACK="atlas-hub-backend-prod"
          REGION="${{ vars.AWS_REGION }}"
          FAIL=0
          FUNCTIONS=$(aws cloudformation list-stack-resources \
            --stack-name "$STACK" \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function'].PhysicalResourceId" \
            --output text --region "$REGION")
          for FUNC in $FUNCTIONS; do
            STATE=$(aws lambda get-function --function-name "$FUNC" \
              --query 'Configuration.State' --output text --region "$REGION" 2>&1)
            if [ "$STATE" = "Active" ]; then echo "✓ $FUNC: Active"
            else echo "✗ $FUNC: $STATE"; FAIL=1; fi
          done
          exit $FAIL
      - name: API — GET /health
        run: |
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "${{ needs.deploy-backend.outputs.api_url }}/health")
          echo "Response: $(cat /tmp/health.json)"
          [ "$HTTP_CODE" = "200" ] && echo "✓ /health: 200 OK" || { echo "✗ HTTP $HTTP_CODE"; exit 1; }

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [deploy-backend, health-check]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Yarn Classic
        run: npm install -g yarn@1.22.22
      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL:              ${{ needs.deploy-backend.outputs.api_url }}
          VITE_COGNITO_USER_POOL_ID: ${{ needs.deploy-backend.outputs.user_pool_id }}
          VITE_COGNITO_CLIENT_ID:    ${{ needs.deploy-backend.outputs.client_id }}
          VITE_AWS_REGION:           ${{ vars.AWS_REGION }}
          VITE_MODE:                 production
        run: yarn build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-master
          path: frontend/dist
          retention-days: 1

  deploy-frontend:
    name: Deploy frontend to Amplify
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}
      - name: Ensure Amplify branch exists
        env:
          APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          BRANCH="master"
          BRANCH_EXISTS=$(aws amplify get-branch \
            --app-id "$APP_ID" --branch-name "$BRANCH" \
            --region "$REGION" \
            --query 'branch.branchName' --output text 2>/dev/null || echo "")
          if [ "$BRANCH_EXISTS" != "$BRANCH" ]; then
            echo "Branch '$BRANCH' não existe — criando..."
            aws amplify create-branch \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --region "$REGION"
            echo "✓ Branch '$BRANCH' criado"
          else
            echo "✓ Branch '$BRANCH' já existe"
          fi
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-master
          path: dist
      - name: Create zip
        run: cd dist && zip -r /tmp/dist.zip .
      - name: Create Amplify deployment
        id: amplify
        env:
          APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          DEPLOY=$(aws amplify create-deployment \
            --app-id "$APP_ID" --branch-name "master" \
            --region "$REGION" --output json)
          echo "job_id=$(echo "$DEPLOY"     | python3 -c "import sys,json; print(json.load(sys.stdin)['jobId'])")"     >> $GITHUB_OUTPUT
          echo "upload_url=$(echo "$DEPLOY" | python3 -c "import sys,json; print(json.load(sys.stdin)['zipUploadUrl'])")" >> $GITHUB_OUTPUT
      - name: Upload build
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X PUT -H "Content-Type: application/zip" \
            --data-binary @/tmp/dist.zip \
            "${{ steps.amplify.outputs.upload_url }}"
      - name: Start deployment
        env:
          APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          aws amplify start-deployment \
            --app-id "$APP_ID" --branch-name "master" \
            --job-id "${{ steps.amplify.outputs.job_id }}" \
            --region "$REGION"
      - name: Wait for completion
        env:
          APP_ID: ${{ vars.AMPLIFY_APP_ID }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" --branch-name "master" \
              --job-id "${{ steps.amplify.outputs.job_id }}" \
              --region "$REGION" --output json \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['job']['summary']['status'])")
            echo "[$i/30] $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then echo "✓ Deploy concluído"; exit 0; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then echo "✗ Falhou"; exit 1; fi
            sleep 10
          done
          echo "✗ Timeout"; exit 1

  # ── Criar admin master no primeiro deploy ─────────────────────
  create-admin-master:
    name: Create admin master user
    runs-on: ubuntu-latest
    needs: [deploy-backend, health-check]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}
      - name: Install dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps
      - name: Check if admin already exists
        id: check
        run: |
          POOL_ID="${{ needs.deploy-backend.outputs.user_pool_id }}"
          COUNT=$(aws cognito-idp list-users \
            --user-pool-id "$POOL_ID" \
            --filter "cognito:user_status = \"CONFIRMED\"" \
            --query 'length(Users)' \
            --output text --region "${{ vars.AWS_REGION }}" 2>/dev/null || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Admin count: $COUNT"
      - name: Create admin master
        if: steps.check.outputs.count == '0'
        env:
          POOL_ID: ${{ needs.deploy-backend.outputs.user_pool_id }}
          ADMIN_EMAIL: ${{ vars.ADMIN_MASTER_EMAIL }}
          REGION: ${{ vars.AWS_REGION }}
          ADMINS_TABLE: AtlasAdmins-prod
        working-directory: backend
        run: npx tsx scripts/create-admin-master.ts
